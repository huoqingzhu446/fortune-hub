services:
  mysql:
    image: mysql:8.4
    container_name: fortune-hub-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fortune_hub}
      MYSQL_USER: ${MYSQL_USER:-fortune}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fortune123}
    ports:
      - '${MYSQL_BIND_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: fortune-hub-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
    ports:
      - '${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: fortune-hub-api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_RUN_MIGRATIONS: ${DB_RUN_MIGRATIONS:-false}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fortune_hub}
      MYSQL_USER: ${MYSQL_USER:-fortune}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fortune123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      FILE_SERVICE_BASE_URL: ${FILE_SERVICE_BASE_URL:-http://8.152.214.57:3000/api}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost:8443}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      BIGMODEL_API_KEY: ${BIGMODEL_API_KEY:-}
      ZHIPU_IMAGE_MODEL: ${ZHIPU_IMAGE_MODEL:-glm-image}
      ZHIPU_WALLPAPER_SIZE_9_16: ${ZHIPU_WALLPAPER_SIZE_9_16:-1088x1472}
      ZHIPU_WALLPAPER_SIZE_16_9: ${ZHIPU_WALLPAPER_SIZE_16_9:-1472x1088}
      ZHIPU_WALLPAPER_SIZE_1_1: ${ZHIPU_WALLPAPER_SIZE_1_1:-1280x1280}
    expose:
      - '${API_PORT:-3001}'
    extra_hosts:
      - host.docker.internal:host-gateway

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_BASE: /admin/
        VITE_API_BASE_URL: /api/v1
        VITE_FILE_SERVICE_BASE_URL: ${FILE_SERVICE_BASE_URL:-http://8.152.214.57:3000/api}
    container_name: fortune-hub-admin
    restart: unless-stopped
    expose:
      - '80'

  mobile-h5:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_FILE_SERVICE_BASE_URL: ${FILE_SERVICE_BASE_URL:-http://8.152.214.57:3000/api}
    container_name: fortune-hub-mobile-h5
    restart: unless-stopped
    expose:
      - '80'

  nginx:
    image: nginx:1.27-alpine
    container_name: fortune-hub-nginx
    restart: unless-stopped
    depends_on:
      - mobile-h5
      - admin
      - api
    ports:
      - '${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_HTTP_PORT:-8080}:80'
      - '${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_HTTPS_PORT:-8443}:443'
    volumes:
      - ./deploy/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  mysql-data:
  redis-data:
